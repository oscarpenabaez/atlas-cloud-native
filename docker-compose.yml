version: '3.9'

services:

  frontend:
    build: ./frontend
    container_name: atlas-frontend
    ports:
      - "5173:5173"

  api-service:
    image: node:20
    container_name: api-service
    working_dir: /app
    volumes:
      - ./api-service:/app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"

  auth-service:
    image: node:20
    container_name: auth-service
    command: tail -f /dev/null

  logs-service:
    image: node:20
    container_name: logs-service
    command: tail -f /dev/null

  database:
    image: postgres:15
    container_name: atlas-db
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas123
      POSTGRES_DB: atlasdb
    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest
    container_name: atlas-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api-service